<!DOCTYPE html>
<html>
<head>
<title>Settings</title>

<style>
body {
  margin:0;
  font-family:Arial;
}

/* SIDEBAR */
.sidebar {
  width:220px;
  height:100vh;
  background:#1e293b;
  color:white;
  padding:20px;
  position: fixed;
  left:0;
  top:0;
}
.sidebar a {
  display:block;
  margin:10px 0;
  color:white;
  text-decoration:none;
  padding:8px;
}
.sidebar a.active {
  background:white;
  color:black;
  border-radius:5px;
}

/* MAIN */
.main {
  margin-left:240px;
  padding:40px;
  background:#f1f5f9;
  min-height:100vh;
}

/* BOX */
.box {
  background:white;
  padding:20px;
  border-radius:10px;
  width:350px;
  margin-bottom:20px;
}

/* INPUT */
input {
  width:100%;
  padding:10px;
  margin:8px 0;
}

/* BUTTON */
button {
  padding:10px;
  margin-top:10px;
  background:#1e293b;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
button:hover {
  background:#334155;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>My IoT</h2>
 <a href="dashboard.html" target="_self" >Dashboard</a>
  <a href="about.html" target="_self" >About</a>
   <a href="setting.html" target="_self" class="active">Setting</a>
</div>

<!-- MAIN -->
<div class="main">

<h2>Settings</h2>

<!-- PASSWORD -->
<div class="box">
  <h3>Change Password</h3>
  <input type="password" id="oldPass" placeholder="Old Password">
  <input type="password" id="newPass" placeholder="New Password">
  <button onclick="changePassword()">Change Password</button>
  <p id="msg"></p>
</div>
<script>

// CHANGE PASSWORD
function changePassword() {
  let oldPass = document.getElementById("oldPass").value;
  let newPass = document.getElementById("newPass").value;
  let saved = localStorage.getItem("password");

  if(oldPass === "" || newPass === ""){
    msg.innerText = "Fill all fields";
  }
  else if(oldPass !== saved){
    msg.innerText = "Wrong old password";
  }
  else{
    localStorage.setItem("password", newPass);
    msg.innerText = "Password updated";
  }
}

// LOGOUT
function logout(){
  window.location.href="login.html";
}

</script>

</body>
</html>

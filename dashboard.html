<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<title>IoT Dashboard</title>

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "ec4a8454-e9eb-476b-89a1-241575125240",
    });
  });
</script>

<style>
body { margin:0; font-family:Arial; display:flex; }

.sidebar {
  width:220px; height:100vh;
  background:#1e293b; color:white; padding:20px;
}
.sidebar a {
  display:block; margin:10px 0; color:white; text-decoration:none; padding:8px;
}
.sidebar a.active { background:white; color:black; border-radius:5px; }

@media(max-width:768px){
  .sidebar{
    display:none;
  }
}

.main { flex:1; padding:20px; background:#f1f5f9; }

.alert {
  display:none;
  background:red; color:white; padding:10px;
  text-align:center; font-weight:bold;
}

.topbar { display:flex; justify-content:space-between; }

.profile {
  position: relative;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}

.profile-pic {
  width:35px;
  height:35px;
  border-radius:50%;
}

.dropdown {
  display:none;
  position:absolute;
  top:45px;
  right:0;
  background:white;
  border-radius:5px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.dropdown a {
  display:block;
  padding:10px;
  text-decoration:none;
  color:black;
}

.card-container { display:flex; gap:20px; margin-top:20px; }
.card {
  background:white; padding:20px; border-radius:10px;
  width:200px; text-align:center;
}

.graph { margin-top:20px; background:white; padding:20px; }
</style>
</head>

<body>

<div class="sidebar">
  <h2>My IoT</h2>
  <a href="dashboard.html" target="_self" class="active" >Dashboard</a>
  <a href="about.html" target="_self" >About</a>
   <a href="setting.html" target="_self" >Setting</a>
</div>

<div class="main">

<div id="alertBox" class="alert">🔥 FIRE DETECTED!</div>

<div class="topbar">
  <h2>Dashboard</h2>

  <div class="profile" onclick="toggleMenu()">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/ac/Default_pfp.jpg" class="profile-pic">
    <span>My Account ⬇</span>

    <div id="dropdown" class="dropdown">
      <a href="setting.html" target="_self">⚙ Settings</a>
      <a href="https://112.gov.in/" target="_blank">📞 Contact</a>
      <a href="index.html">🚪 Logout</a>
    </div>
  </div>
</div>

<div class="container mt-4">
  <div class="row g-3">

    <div class="col-12 col-md-4">
      <div class="card text-center p-3">
        <h3>Temp</h3>
        <p id="temp">--</p>
      </div>
    </div>

    <div class="col-12 col-md-4">
      <div class="card text-center p-3">
        <h3>Humidity</h3>
        <p id="hum">--</p>
      </div>
    </div>

    <div class="col-12 col-md-4">
      <div class="card text-center p-3" id="fireCard">
        <h3>Fire</h3>
        <p id="fire">--</p>
      </div>
    </div>

  </div>
</div>
<div class="graph">
  <canvas id="chart" height="100"></canvas>
</div>

</div>

<!-- LIBRARIES -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://snobcpvhsicscqcjzrpe.supabase.co";
const supabaseKey = "sb_publishable__3TH8R6FGGd8dgZRqW9n-Q_OztstHTV";

const client = supabase.createClient(supabaseUrl, supabaseKey);

// 🔥 IMPORTANT
let fireSent = false;

// GRAPH
const chartElement = document.getElementById("chart");

let chart = new Chart(chartElement, {
  type: "line",
  data: {
    labels: [],
    datasets: [
      { label:"Temp", data:[], borderColor:"red" },
      { label:"Humidity", data:[], borderColor:"blue" }
    ]
  }
});

// FETCH DATA
async function getData(){

  let { data, error } = await client
    .from("iot_data")
    .select("*")
    .order("id", { ascending: false })
    .limit(1);

  if(error){
    console.error("SUPABASE ERROR:", error.message);
    return;
  }

  if(!data || data.length === 0) return;

  let d = data[0];

  document.getElementById("temp").innerText = d.temperature + "°C";
  document.getElementById("hum").innerText = d.humidity + "%";
  document.getElementById("fire").innerText = d.fire;

  let time = new Date().toLocaleTimeString();

  chart.data.labels.push(time);
  chart.data.datasets[0].data.push(d.temperature);
  chart.data.datasets[1].data.push(d.humidity);

  if(chart.data.labels.length > 10){
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
    chart.data.datasets[1].data.shift();
  }

  chart.update();

  // 🔥 FIRE LOGIC
  if(d.fire === "FIRE" && !fireSent){
    document.getElementById("alertBox").style.display = "block";
    document.getElementById("fireCard").style.background = "red";

    sendNotification();
    fireSent = true;
  } 
  else if(d.fire === "NO"){
    document.getElementById("alertBox").style.display = "none";
    document.getElementById("fireCard").style.background = "white";

    fireSent = false;
  }

} // ✅ FUNCTION CLOSED PROPERLY

// RUN
getData();
setInterval(getData, 3000);

// 🔔 NOTIFICATION PERMISSION
if (Notification.permission !== "granted") {
  Notification.requestPermission();
}

// 🔔 SEND NOTIFICATION
function sendNotification() {
  if (Notification.permission === "granted") {
    new Notification("🔥 FIRE ALERT!", {
      body: "Fire detected in your system!",
      icon: "https://cdn-icons-png.flaticon.com/512/482/482525.png"
    });
  }
}

// 👤 DROPDOWN
function toggleMenu(){
  const menu = document.getElementById("dropdown");
  menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

// CLOSE ON OUTSIDE CLICK
window.addEventListener("click", function(e){
  if(!e.target.closest(".profile")){
    document.getElementById("dropdown").style.display = "none";
  }
});

</script>
</body>
</html>

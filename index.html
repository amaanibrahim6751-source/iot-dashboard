<!DOCTYPE html>
<html lang="en">
<head>
<title>Login</title>

<style>

body {
  margin: 0;
  height: 100vh;
  font-family: 'Times New Roman', Times, serif;

  background: url("https://d32zxht0g2dn3w.cloudfront.net/s3fs-public/2024-02/c7febee8-9fa3-4730-a73f-9d0b7c0e9945.png") no-repeat center center/cover;
}

.main-container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.login-box {
  width: 300px;
  padding: 30px;
  border: 2px solid white;
  text-align: center;

  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(10px);
  color: white;
}

input, button {
  width: 80%;
  padding: 10px;
  margin: 10px auto;
  display: block;
}

h2 {
  font-size: 40px;
}

p {
  font-size: 18px;
}

.footer {
  background: #484949;
  color: white;
  text-align: center;
  padding: 20px;
  margin-top: 40px;
}

.footer a {
  display: block;
  margin: 8px 0;
  text-decoration: none;
  font-size: 16px;
}

/* Colors */
.insta { color: #da3434; }
.fb { color: #1877f2; }
.linkedin { color: #cacccf; }

/* Hover effect */
.footer a:hover {
  text-decoration: underline;
}

</style>

</head>

<body>

<div class="main-container">

  <div class="login-box">

  <h2>Login</h2>
<label for="Email ID">Email ID:</label><br>
<input type="email" id="email" placeholder="Enter Email">
<label for="Password">Password:</label><br>
<input type="password" id="password" placeholder="Enter password">
  
<button onclick="login()">Login</button>
<p id="msg" style="color:red;"></p>  
    <p>Don't have an account?
      <a href="signup.html">Sign up</a>
    </p>

   <footer class="footer">
  <p>Follow us</p>

  <a href=" https://www.instagram.com/amaan_.i18?igsh=dHp2aDdrejNsd2F2&utm_source=ig_contact_invite" target="_blank" class="insta">
    Instagram
  </a>

  <a href="https://www.facebook.com/share/17PFVSJtU2/" class="fb">
    Facebook
  </a>

  <a href="https://www.linkedin.com/in/amaan-ibrahim-6a0068360?utm_source=share_via&utm_content=profile&utm_medium=member_android" class="linkedin">
    LinkedIn
  </a>
</footer>
  </div>

</div>

</body>
<script>

function login() {

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  let savedEmail = localStorage.getItem("email");
  let savedPassword = localStorage.getItem("password");

  if(email === "" || password === ""){
    document.getElementById("msg").innerText = "Please fill all fields";
  }
  else if(email === savedEmail && password === savedPassword){
    window.location.href = "dashboard.html";
  }
  else{
    document.getElementById("msg").innerText = "Invalid Email or Password";
  }
}

</script>
</html>
